<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artifact Portal</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Artifact Portal</h1>
      <p class="subtitle">Unified search across Docker, npm, PyPI and VS Code extensions</p>

      <form id="search-form">
        <input id="query" type="text" placeholder="Search package or extension name" required />
        <select id="type">
          <option value="all">All</option>
          <option value="docker">Docker</option>
          <option value="npm">npm</option>
          <option value="pypi">PyPI</option>
          <option value="extension">Extensions</option>
        </select>
        <button type="submit">Search</button>
      </form>

      <section>
        <h2>Backend Health</h2>
        <pre id="health">Loading...</pre>
      </section>

      <section>
        <h2>Results</h2>
        <div id="results"></div>
      </section>
    </main>
    <script src="/static/search.js"></script>
  </body>
  </html>
