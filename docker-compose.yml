name: artifact-proxy-stack

services:
  devpi:
    build:
      context: ./devpi
    container_name: devpi
    restart: unless-stopped
    environment:
      DEVPISERVER_SERVERDIR: /data/server
      DEVPISERVER_SECRETFILE: /data/server/.secret
      DEVPISERVER_THREADS: "4"
      DEVPISERVER_CONNECTION_LIMIT: "20"
      DEVPISERVER_KEYFS_CACHE_SIZE: "2000"
      DEVPISERVER_INDEXER_BACKEND: "null"
      DEVPI_PORT: "3141"
    volumes:
      - devpi_data:/data
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.devpi.rule=Host(`pypi.${DOMAIN}`) && !PathPrefix(`/assets/`) && !PathRegexp(`^/.*:.*$`)
      - traefik.http.routers.devpi-http.rule=Host(`pypi.${DOMAIN}`) && !PathPrefix(`/assets/`) && !PathRegexp(`^/.*:.*$`)
      - traefik.http.routers.devpi-http.entrypoints=web
      - traefik.http.routers.devpi-http.middlewares=redirect-to-https@docker
      - traefik.http.routers.devpi.entrypoints=websecure
      - traefik.http.routers.devpi.tls.certresolver=le
      - traefik.http.routers.devpi.middlewares=devpi-ratelimit,devpi-inflight
      - traefik.http.middlewares.devpi-ratelimit.ratelimit.average=10
      - traefik.http.middlewares.devpi-ratelimit.ratelimit.burst=20
      - traefik.http.middlewares.devpi-inflight.inflightreq.amount=20
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true
      - traefik.http.services.devpi.loadbalancer.server.port=3141

  verdaccio:
    image: verdaccio/verdaccio:6
    container_name: verdaccio
    restart: unless-stopped
    volumes:
      - ./verdaccio/config.yaml:/verdaccio/conf/config.yaml:ro
      - verdaccio_storage:/verdaccio/storage
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.verdaccio.rule=Host(`npm.${DOMAIN}`)
      - traefik.http.routers.verdaccio-http.rule=Host(`npm.${DOMAIN}`)
      - traefik.http.routers.verdaccio-http.entrypoints=web
      - traefik.http.services.verdaccio.loadbalancer.server.port=4873

  openvsx-postgres:
    image: postgres:16
    container_name: openvsx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${OPENVSX_POSTGRES_DB}
      POSTGRES_USER: ${OPENVSX_POSTGRES_USER}
      POSTGRES_PASSWORD: ${OPENVSX_POSTGRES_PASSWORD}
    volumes:
      - openvsx_postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  openvsx-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.24
    container_name: openvsx-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - openvsx_es_data:/usr/share/elasticsearch/data
    networks:
      - internal

  openvsx:
    image: ghcr.io/eclipse/openvsx-server:v0.32.3
    container_name: openvsx
    user: "0:0"
    restart: unless-stopped
    depends_on:
      - openvsx-postgres
      - openvsx-elasticsearch
    environment:
      SPRING_AUTOCONFIGURE_EXCLUDE: org.jobrunr.spring.autoconfigure.storage.JobRunrElasticSearchStorageAutoConfiguration,com.giffing.bucket4j.spring.boot.starter.Bucket4jAutoConfiguration
      ORG_JOBRUNR_DATABASE_TYPE: sql
    volumes:
      - ./openvsx/application.yml:/home/openvsx/server/config/application.yml:ro
      - openvsx_data:/home/openvsx/data
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.openvsx.rule=Host(`openvsx.${DOMAIN}`)
      - traefik.http.routers.openvsx-http.rule=Host(`openvsx.${DOMAIN}`)
      - traefik.http.routers.openvsx-http.entrypoints=web
      - traefik.http.routers.openvsx-http.middlewares=redirect-to-https@docker
      - traefik.http.routers.openvsx.entrypoints=websecure
      - traefik.http.routers.openvsx.tls.certresolver=le
      - traefik.http.services.openvsx.loadbalancer.server.port=8080

  portal:
    build:
      context: ./portal
    container_name: artifact-portal
    restart: unless-stopped
    depends_on:
      - devpi
      - verdaccio
      - openvsx
    environment:
      HARBOR_API_URL: http://harbor-nginx:8080/api/v2.0
      VERDACCIO_URL: http://verdaccio:4873
      DEVPI_URL: http://devpi:3141
      OPENVSX_URL: http://openvsx:8080
      PUBLIC_DOCKER_REGISTRY: https://docker.${DOMAIN}
      HARBOR_PROXY_PROJECT: ${HARBOR_PROXY_PROJECT}
      PUBLIC_NPM_REGISTRY: https://npm.${DOMAIN}
      PUBLIC_PYPI_INDEX_URL: ${PYPI_INDEX_URL}
      PUBLIC_PYPI_TRUSTED_HOST: ${PYPI_TRUSTED_HOST}
      PUBLIC_OPENVSX_GALLERY: https://openvsx.${DOMAIN}/vscode/gallery
      PORTAL_BIND: 0.0.0.0
      PORTAL_PORT: "8000"
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.portal.rule=Host(`registry.${DOMAIN}`)
      - traefik.http.routers.portal-http.rule=Host(`registry.${DOMAIN}`)
      - traefik.http.routers.portal-http.entrypoints=web
      - traefik.http.routers.portal-http.middlewares=redirect-to-https@docker
      - traefik.http.routers.portal.entrypoints=websecure
      - traefik.http.routers.portal.tls.certresolver=le
      - traefik.http.services.portal.loadbalancer.server.port=8000

# Harbor is deployed from ./harbor with official installer and then
# joined to networks "proxy" and "internal" so portal can query Harbor API.

volumes:
  devpi_data:
  verdaccio_storage:
  openvsx_postgres_data:
  openvsx_es_data:
  openvsx_data:

networks:
  proxy:
    external: true
    name: proxy
  internal:
    name: artifact_proxy_internal

